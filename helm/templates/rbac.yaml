apiVersion: v1
kind: ServiceAccount
metadata:
  name: recurring-task-creator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "recurring-task-creator.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: recurring-task-creator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "recurring-task-creator.labels" . | nindent 4 }}
rules:
  - apiGroups: [task.benjamin-borbe.de]
    resources: [schedules]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: recurring-task-creator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "recurring-task-creator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: recurring-task-creator
subjects:
  - kind: ServiceAccount
    name: recurring-task-creator
    namespace: {{ .Release.Namespace }}
---
# ClusterRole is namespace-suffixed so dev + prod installs don't collide on the
# cluster-scoped object. The pod self-installs the Schedule CRD at boot, so it
# needs to create/patch CustomResourceDefinitions.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: recurring-task-creator-{{ .Release.Namespace }}
  labels:
    {{- include "recurring-task-creator.labels" . | nindent 4 }}
rules:
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: recurring-task-creator-{{ .Release.Namespace }}
  labels:
    {{- include "recurring-task-creator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: recurring-task-creator-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: recurring-task-creator
    namespace: {{ .Release.Namespace }}
