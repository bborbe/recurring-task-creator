apiVersion: task.benjamin-borbe.de/v1
kind: Schedule
metadata:
  name: update-inventar
spec:
  vault: personal
  title: Update inventar
  schedule:
    recurrence: Monthly
  template:
    body: |-
      Review purchases and add new items to Obsidian inventory.

      [Monthly Inventory Update Guide](obsidian://open?vault=Personal&file=50%20Knowledge%20Base%2FMonthly%20Inventory%20Update%20Guide)

      Steps:

      1. Review trading business invoices in Google Drive
      2. Check for personal purchases
      3. Add items following the inventory guide
      4. Verify items appear in dashboard
